# Конфигурация LibreChat

version: 1.1.5

mcpServers:
  sequential-thinking:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]

  open-web-search:
    command: npx
    args: ["-y", "open-websearch"]
    env:
      MODE: "stdio"

  fetch:
    command: npx
    args: ["-y", "mcp-server-fetch-typescript"]

  brave-search:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "BSAPud5SgHb1xdKe0nXGiXPZIiv123f"

endpoints:
  agents:
    disableBuilder: false
    capabilities:
      - execute_code
      - file_search
      - actions
      - tools
