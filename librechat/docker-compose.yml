services:
  api:
    container_name: LibreChat
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - ./librechat.yaml:/app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mongodb
      - rag_api
    networks:
      - proxy_network
      - default

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    # User mapping for proper permissions handling in Linux
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-DrhYf7zENyR6AlUCKmnz0eYASOQdl6zxH7s7MKFSfFCt}
    volumes:
      - ./meili_data:/meili_data

  vectordb:
    container_name: chat-vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - vectordb_data:/var/lib/postgresql/data

  rag_api:
    container_name: chat-rag_api
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

  code-interpreter-api:
    image: ghcr.io/usnavy13/librecodeinterpreter:main
    deploy:
      resources:
        limits:
          memory: 3G
    pull_policy: always
    container_name: chat-code-interpreter-api
    restart: unless-stopped
    init: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - API_KEY=${LIBRECHAT_CODE_API_KEY:-local_master_key}
      - REDIS_HOST=code-interpreter-redis
      - MINIO_ENDPOINT=code-interpreter-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - sandbox-data:/var/lib/code-interpreter/sandboxes
    tmpfs:
      - /app/data:size=100m
    depends_on:
      code-interpreter-redis:
        condition: service_healthy
      code-interpreter-minio-init:
        condition: service_completed_successfully

  code-interpreter-redis:
    image: redis:7-alpine
    container_name: chat-code-interpreter-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - sandbox-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  code-interpreter-minio:
    image: minio/minio:latest
    container_name: chat-code-interpreter-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - sandbox-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  code-interpreter-minio-init:
    image: minio/mc:latest
    depends_on:
      code-interpreter-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://code-interpreter-minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/code-interpreter-files;
      exit 0;
      "

volumes:
  vectordb_data:
  sandbox-data:
  sandbox-redis-data:
  sandbox-minio-data:

networks:
  proxy_network:
    external: true
    name: my_server_proxy_network
