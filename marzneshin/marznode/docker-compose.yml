# Marznode Docker-Compose Template
# Deploy this to each VPS with the appropriate config files from the node-specific directory.
#
# Usage:
#   1. Copy this file to the VPS
#   2. Copy the correct xray_config.json and singbox_config.json from the node directory (nl1/, nl2/, fi/, lu/)
#   3. Copy the client_cert.pem from the Marzneshin panel
#   4. Run: docker compose up -d

services:
  marznode:
    image: dawsh/marznode:latest
    container_name: marznode
    restart: always
    network_mode: host
    environment:
      SERVICE_ADDRESS: "0.0.0.0"
      SERVICE_PORT: "62050"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/lib/xray"
      XRAY_CONFIG_PATH: "/var/lib/marznode/xray_config.json"

      SING_BOX_ENABLED: "True"
      SING_BOX_EXECUTABLE_PATH: "/usr/local/bin/sing-box"
      SING_BOX_CONFIG_PATH: "/var/lib/marznode/singbox_config.json"

      # Client certificate from Marzneshin Panel
      SSL_CLIENT_CERT_FILE: "/var/lib/marznode/client_cert.pem"
    volumes:
      - /var/lib/marznode:/var/lib/marznode
      - ./client_cert.pem:/var/lib/marznode/client_cert.pem
      - ./xray_config.json:/var/lib/marznode/xray_config.json
      - ./singbox_config.json:/var/lib/marznode/singbox_config.json
