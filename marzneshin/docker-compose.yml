services:
  marzneshin:
    image: dawsh/marzneshin:latest
    restart: always
    env_file: .env
    network_mode: host
    volumes:
      - ./data:/var/lib/marzneshin
      - ./xray_config.json:/etc/marzneshin/xray_config.json
    environment:
      - XRAY_CONFIG_FILE=/etc/marzneshin/xray_config.json
      - TZ=Europe/Moscow
    logging:
      driver: "json-file"
    depends_on:
      - marzneshin-db
      - marznode

  # Домашняя VPN-нода для доступа к локальной сети
  # Порт 443 остаётся свободным для nginx
  marznode:
    image: dawsh/marznode:latest
    container_name: marznode-home
    restart: always
    network_mode: host
    environment:
      SERVICE_ADDRESS: "0.0.0.0"
      SERVICE_PORT: "62050"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/lib/xray"
      XRAY_CONFIG_PATH: "/var/lib/marznode/xray_config.json"
      SING_BOX_ENABLED: "True"
      SING_BOX_EXECUTABLE_PATH: "/usr/local/bin/sing-box"
      SING_BOX_CONFIG_PATH: "/var/lib/marznode/singbox_config.json"
      SSL_CLIENT_CERT_FILE: "/var/lib/marznode/client_cert.pem"
    volumes:
      - /var/lib/marznode:/var/lib/marznode
      - ./marznode/home/xray_config.json:/var/lib/marznode/xray_config.json
      - ./marznode/home/singbox_config.json:/var/lib/marznode/singbox_config.json
      - ./marznode/client_cert.pem:/var/lib/marznode/client_cert.pem

  marzneshin-db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-marzneshin_root_pass}
      MYSQL_DATABASE: marzneshin
      MYSQL_USER: marzneshin
      MYSQL_PASSWORD: ${DB_PASSWORD:-marzneshin_secure_pass}
    ports:
      - "127.0.0.1:33060:3306" # Пробрасываем только на локалхост, т.к. панель в режиме host
    volumes:
      - ./db-data:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
