services:
  hermes-qa:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-qa
    restart: unless-stopped
    volumes:
      - ./hermes-qa:/opt/data
    env_file:
      - .env
    environment:
      - HERMES_GATEWAY_PORT=19700
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_PORT=9119
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_QA}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY}
      - no_proxy=spawn-sanitizer,localhost,127.0.0.1
    ports:
      - "19700:19700"
      - "9119:9119"
    command: ["gateway", "run"]
    networks:
      - proxy_network
    mem_limit: 2g

  hermes-finanalyst:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-finanalyst
    restart: unless-stopped
    volumes:
      - ./hermes-finanalyst:/opt/data
    env_file:
      - .env
    environment:
      - HERMES_GATEWAY_PORT=19701
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_PORT=9120
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_FINANALYST}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY}
      - no_proxy=spawn-sanitizer,localhost,127.0.0.1
    ports:
      - "19701:19701"
      - "9120:9120"
    command: ["gateway", "run"]
    networks:
      - proxy_network
    mem_limit: 2g

networks:
  proxy_network:
    external: true
    name: my_server_proxy_network
