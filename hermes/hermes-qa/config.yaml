# ═══════════════════════════════════════════════════════════════
# Hermes QA Team — CLI Configuration
# ═══════════════════════════════════════════════════════════════

# Model — all requests go through OmniRoute (spawn-sanitizer)
model:
  default: "gemini-cli/gemini-3.1-pro-preview"
  provider: "custom"
  base_url: "http://spawn-sanitizer:18780/v1"
  # api_key comes from OPENAI_API_KEY in .env

# ── Agent Behavior ──────────────────────────────────────────
agent:
  max_turns: 60
  auto_compact: true

# ── Context Compression ────────────────────────────────────
compression:
  threshold: 0.50

# ── Terminal Access ─────────────────────────────────────────
terminal:
  backend: local
  timeout: 180
  allowed_commands: "all"

# ── Sub-Agent Delegation ──────────────────────────────────
# QA Orchestrator delegates to: qa_designer, qa_executor, tg_tester
delegation:
  max_iterations: 50
  max_spawn_depth: 2
  max_concurrent_children: 3
  subagent_auto_approve: false
  inherit_mcp_toolsets: true

# ── Code Execution Sandbox ────────────────────────────────
code_execution:
  timeout: 300
  max_tool_calls: 50

# ── Display ───────────────────────────────────────────────
display:
  compact: false
  tool_progress: all
  streaming: true
  skin: slate

# ── Model Aliases ─────────────────────────────────────────
model_aliases:
  gemini:
    model: "gemini-cli/gemini-3.1-pro-preview"
    provider: custom
    base_url: "http://spawn-sanitizer:18780/v1"
