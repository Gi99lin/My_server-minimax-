

services:
  # ==================== OpenClaw Gateway ====================
  openclaw-gateway:
    image: ghcr.io/gi99lin/openclaw:2026.4.21-patched2
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
      - ${DEVTEAM_PROJECTS_DIR:-~/devteam-projects}:/home/node/.openclaw/workspace/devteam/projects
      - ${OBSIDIAN_VAULT_DIR:-~/obsidian-vault}:/home/node/.openclaw/workspace/obsidian-vault:rw
    environment:
      - TZ=Europe/Moscow
      - OPENCLAW_GATEWAY_BIND=lan
      - NODE_OPTIONS=--max-old-space-size=4096 --dns-result-order=ipv4first
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_PROXY_URL=${OPENCLAW_PROXY_URL}
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - no_proxy=spawn-sanitizer,localhost,127.0.0.1,browserless,telegram-mcp,ai-presentation-frontend,ai-presentation-backend,testcase-backend,testcase-frontend
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TRADINGVIEW_RAPIDAPI_KEY=${TRADINGVIEW_RAPIDAPI_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OMNIROUTE_API_KEY=${OMNIROUTE_API_KEY}
      - TELEGRAM_BOT_TOKEN_MAIN=${TELEGRAM_BOT_TOKEN_MAIN}
      - TELEGRAM_BOT_TOKEN_FINANALYST=${TELEGRAM_BOT_TOKEN_FINANALYST}
      - TELEGRAM_BOT_TOKEN_DEVTEAM=${TELEGRAM_BOT_TOKEN_DEVTEAM}
      - TELEGRAM_BOT_TOKEN_QA=${TELEGRAM_BOT_TOKEN_QA}
      # --- MTProto QA User Client (Pyrogram) ---
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_TEST_PHONE=${TELEGRAM_TEST_PHONE}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/.npm-global/bin
    depends_on:
      telegram-mcp:
        condition: service_healthy
      browserless:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 5G
    networks:
      - openclaw_network
      - proxy_network

  # ==================== OpenClaw CLI (management) ====================
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
      - ${DEVTEAM_PROJECTS_DIR:-~/devteam-projects}:/home/node/.openclaw/workspace/devteam/projects
    profiles:
      - cli
    environment:
      - TZ=Europe/Moscow
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/.npm-global/bin
    entrypoint: ["node", "dist/index.js"]

  # ==================== Spawn Sanitizer Proxy ====================
  spawn-sanitizer:
    image: node:22-slim
    container_name: spawn-sanitizer
    restart: unless-stopped
    volumes:
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}/scripts/subagent/spawn-sanitizer-proxy.mjs:/app/proxy.mjs:ro
    environment:
      - UPSTREAM_URL=http://omniroute:20128
      - LISTEN_PORT=18780
      - DEBUG=1
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - http_proxy=${OPENCLAW_PROXY_URL}
      - https_proxy=${OPENCLAW_PROXY_URL}
      - no_proxy=omniroute,localhost,127.0.0.1
      - TRADINGVIEW_RAPIDAPI_KEY=${TRADINGVIEW_RAPIDAPI_KEY:-6d86fe3de6msh2f953b42443ce21p1b2e18jsn14d4dea9995d}
    command: ["node", "/app/proxy.mjs"]
    networks:
      - proxy_network

  # ==================== Browserless (headless Chrome for browser plugin) ====================
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    restart: unless-stopped
    environment:
      - TIMEOUT=120000
      - CONCURRENT=5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - openclaw_network

  # ==================== Telegram MCP Sidecar ====================
  telegram-mcp:
    build: ./telegram-mcp
    container_name: telegram-mcp
    restart: unless-stopped
    ports:
      - "8932:8932"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - TZ=Europe/Moscow
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION_STRING=${TELEGRAM_SESSION_STRING}
      - MCP_SSE_HOST=0.0.0.0
      - MCP_SSE_PORT=8932
      - OPENCLAW_PROXY_URL=${OPENCLAW_PROXY_URL}
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - http_proxy=${OPENCLAW_PROXY_URL}
      - https_proxy=${OPENCLAW_PROXY_URL}
      - no_proxy=localhost,127.0.0.1
    # Healthcheck mirrors playwright-mcp pattern: TCP port check
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8932/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - openclaw_network
      - proxy_network

# ==================== Networks & Volumes ====================
networks:
  openclaw_network:
    driver: bridge
    name: openclaw_network
  proxy_network:
    external: true
    name: my_server_proxy_network
