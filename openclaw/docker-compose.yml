

services:
  # ==================== OpenClaw Gateway ====================
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
      - ${OBSIDIAN_VAULT_DIR:-~/obsidian-vault}:/home/node/.openclaw/workspace/obsidian-vault:rw
    environment:
      - TZ=Europe/Moscow
      - OPENCLAW_GATEWAY_BIND=lan
      - NODE_OPTIONS=--max-old-space-size=2048 --dns-result-order=ipv4first
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_PROXY_URL=${OPENCLAW_PROXY_URL}
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - no_proxy=spawn-sanitizer,localhost,127.0.0.1
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TRADINGVIEW_RAPIDAPI_KEY=${TRADINGVIEW_RAPIDAPI_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OMNIROUTE_API_KEY=${OMNIROUTE_API_KEY}
      - TELEGRAM_BOT_TOKEN_MAIN=${TELEGRAM_BOT_TOKEN_MAIN}
      - TELEGRAM_BOT_TOKEN_FINANALYST=${TELEGRAM_BOT_TOKEN_FINANALYST}
      - TELEGRAM_BOT_TOKEN_DEVTEAM=${TELEGRAM_BOT_TOKEN_DEVTEAM}
      - TELEGRAM_BOT_TOKEN_QA=${TELEGRAM_BOT_TOKEN_QA}
      # --- MTProto QA User Client (Pyrogram) ---
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_TEST_PHONE=${TELEGRAM_TEST_PHONE}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/.npm-global/bin
    depends_on:
      playwright-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - openclaw_network
      - proxy_network

  # ==================== OpenClaw CLI (management) ====================
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}:/home/node/.openclaw/workspace
    profiles:
      - cli
    environment:
      - TZ=Europe/Moscow
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/node/.openclaw/.npm-global/bin
    entrypoint: ["node", "dist/index.js"]

  # ==================== Spawn Sanitizer Proxy ====================
  spawn-sanitizer:
    image: node:22-slim
    container_name: spawn-sanitizer
    restart: unless-stopped
    volumes:
      - ${OPENCLAW_WORKSPACE_DIR:-~/.openclaw/workspace}/scripts/subagent/spawn-sanitizer-proxy.mjs:/app/proxy.mjs:ro
    environment:
      - UPSTREAM_URL=http://omniroute:20128
      - LISTEN_PORT=18780
      - DEBUG=1
      - HTTP_PROXY=${OPENCLAW_PROXY_URL}
      - HTTPS_PROXY=${OPENCLAW_PROXY_URL}
      - http_proxy=${OPENCLAW_PROXY_URL}
      - https_proxy=${OPENCLAW_PROXY_URL}
      - no_proxy=omniroute,localhost,127.0.0.1
      - TRADINGVIEW_RAPIDAPI_KEY=${TRADINGVIEW_RAPIDAPI_KEY:-6d86fe3de6msh2f953b42443ce21p1b2e18jsn14d4dea9995d}
    command: ["node", "/app/proxy.mjs"]
    networks:
      - proxy_network

  # ==================== Playwright MCP Sidecar ====================
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    container_name: playwright-mcp
    restart: unless-stopped
    ports:
      - "8931:8931"
    environment:
      - TZ=Europe/Moscow
      - DEBUG=mcp:*
    command: ["--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "*"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8931, 'localhost', ()=>process.exit(0)).on('error', ()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 5s
    networks:
      - openclaw_network

# ==================== Networks & Volumes ====================
networks:
  openclaw_network:
    driver: bridge
  proxy_network:
    external: true
    name: my_server_proxy_network
