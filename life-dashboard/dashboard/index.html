<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <meta name="description" content="Personal life metrics dashboard — mood, sleep, productivity, health tracking">
    <link rel="icon" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" id="app">
        <!-- Header (Logo & Greeting) -->
        <header class="header" id="header" style="margin-bottom: 12px;">
            <div class="header-left">
                <span class="logo"><span class="logo-accent">Life</span> Dashboard</span>
                <h1 class="greeting" id="greeting">—</h1>
            </div>
            <div class="header-right">
                <span class="sync-dot" id="syncDot"></span>
            </div>
        </header>

        <!-- Top Controls Row (Tabs + Widgets) -->
        <div class="top-controls-row">
            <!-- Left: Tabs Column -->
            <div class="controls-left">
                <nav class="tabs" id="tabs">
                    <button class="tab active" data-tab="dashboard">Обзор</button>
                    <button class="tab" data-tab="devops">Инфраструктура</button>
                    <button class="tab" data-tab="analytics">Аналитика</button>
                    <button class="tab" data-tab="librechat">LibreChat</button>
                    <button class="tab" data-tab="openclaw">OpenClaw</button>
                    <button class="tab" data-tab="omniroute">OmniRoute</button>
                </nav>
            </div>

            <!-- Right: Widgets Column -->
            <div class="controls-right">
                <!-- Weather Full Block -->
                <div class="top-widget flex-col" id="weatherWidget">
                    <div class="weather-current-row">
                        <span class="weather-icon" id="weatherIcon"></span>
                        <span class="weather-temp" id="weatherTemp">—</span>
                        <div class="weather-text">
                            <div class="weather-desc" id="weatherDesc"></div>
                            <div class="weather-pressure" id="weatherPressure"></div>
                        </div>
                    </div>
                    <div class="weather-hourly" id="weatherHourly"></div>
                </div>

                <!-- Date & Schedule Block -->
                <div class="top-widget flex-col schedule-widget-pane">
                    <div class="date-big-display" id="dateDisplay">—</div>
                    <div id="liveSchedule" class="top-live-schedule"></div>
                </div>
            </div>
        </div>

        <!-- Tab: Dashboard -->
        <main class="tab-content active" id="tab-dashboard">
            <!-- Stat Cards -->
            <section class="stat-cards" id="statCards"></section>

            <!-- Charts Row -->
            <section class="charts-row">
                <div class="chart-card" id="trendChartCard" style="--i: 0">
                    <div class="chart-header">
                        <h2>Тренды</h2>
                        <div class="period-selector" id="periodSelector">
                            <button class="period-btn" data-days="7">7д</button>
                            <button class="period-btn active" data-days="30">30д</button>
                            <button class="period-btn" data-days="90">90д</button>
                        </div>
                    </div>
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="chart-card" id="timeBreakdownCard" style="--i: 1">
                    <div class="chart-header">
                        <h2>Время за неделю</h2>
                    </div>
                    <canvas id="timeChart"></canvas>
                </div>
            </section>

            <!-- Bottom Row -->
            <section class="bottom-row">
                <div class="chart-card heatmap-card" id="heatmapCard" style="--i: 2">
                    <div class="chart-header">
                        <h2>История настроения</h2>
                    </div>
                    <div id="moodHeatmap" class="heatmap-container"></div>
                </div>
                <div class="chart-card quick-entry-card" id="quickEntryCard" style="--i: 3">
                    <div class="chart-header">
                        <h2>Быстрый ввод</h2>
                    </div>
                    <div id="quickEntry" class="quick-entry"></div>
                </div>
            </section>
        </main>

        <!-- Tab: Infrastructure -->
        <main class="tab-content" id="tab-devops">
            <div class="chart-card" id="devopsFullCard" style="--i: 0; min-height: 60vh;">
                <div class="chart-header">
                    <h2>Центр управления LifeOS</h2>
                </div>
                <div id="devOpsHUD"></div>
            </div>
        </main>

        <!-- Tab: Health Analytics -->
        <main class="tab-content" id="tab-analytics">
            <div class="charts-row" style="margin-bottom: var(--gap);">
                <div class="chart-card" style="--i: 0">
                    <div class="chart-header">
                        <h2>Стресс и Энергия (Body Battery)</h2>
                    </div>
                    <canvas id="stressChart" style="max-height: 220px;"></canvas>
                </div>
                <div class="chart-card" style="--i: 0.5">
                    <div class="chart-header">
                        <h2>Пульс (Сердцебиение)</h2>
                    </div>
                    <canvas id="hrChart" style="max-height: 220px;"></canvas>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card" style="--i: 1">
                    <div class="chart-header">
                        <h2>Кислород в крови (SpO2)</h2>
                    </div>
                    <canvas id="spo2Chart" style="max-height: 220px;"></canvas>
                </div>
                <div class="chart-card" style="--i: 1.5">
                    <div class="chart-header">
                        <h2>Сожженные Калории</h2>
                    </div>
                    <canvas id="caloriesChart" style="max-height: 220px;"></canvas>
                </div>
            </div>
        </main>

        <!-- Embedded Apps Tabs -->
        <main class="tab-content app-iframe-tab" id="tab-librechat">
            <iframe src="https://chat.gigglin.tech/" class="app-iframe" allow="microphone; camera; clipboard-read; clipboard-write"></iframe>
        </main>

        <main class="tab-content app-iframe-tab" id="tab-openclaw">
            <iframe src="https://ai.gigglin.tech/" class="app-iframe"></iframe>
        </main>

        <main class="tab-content app-iframe-tab" id="tab-omniroute">
            <iframe src="https://omniroute.gigglin.tech/" class="app-iframe"></iframe>
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
